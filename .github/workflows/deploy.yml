name: Deploy to GitHub Pages

on:
  # Build + deploy on every push to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the deploy needs (least-privilege).
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Installs deps (npm ci), runs `astro build`, and uploads ./dist as the
      # Pages artifact. Auto-detects npm from package-lock.json.
      #
      # Supabase config is passed from repo Variables (Settings → Secrets and
      # variables → Actions → Variables). The anon key is PUBLIC by design and
      # secured by INSERT-only RLS, so it lives in Variables, not Secrets.
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 20
        env:
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ vars.PUBLIC_SUPABASE_ANON_KEY }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
